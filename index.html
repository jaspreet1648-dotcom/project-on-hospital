<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">
  <button onclick="toggleMenu()">☰</button>
  <h1>🏥 Hospital Management</h1>
  <button onclick="toggleDark()">🌙</button>
</header>

<aside id="sidebar" class="sidebar">
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('patients')">Patients</button>
  <button onclick="showPage('doctors')">Doctors</button>
  <button onclick="showPage('appointments')">Appointments</button>
  <button onclick="showPage('billing')">Billing</button>
  <button onclick="showPage('analytics')">Analytics</button>
</aside>

<main class="main">

<!-- DASHBOARD -->
<section id="dashboard" class="page">
  <div class="grid">
    <div class="card">Patients<h2 id="dp">0</h2></div>
    <div class="card">Doctors<h2 id="dd">0</h2></div>
    <div class="card">Appointments<h2 id="da">0</h2></div>
  </div>
</section>

<!-- PATIENTS -->
<section id="patients" class="page">
  <h2>Patients</h2>
  <input id="pname" placeholder="Name">
  <input id="pageAge" type="number" placeholder="Age">
  <button onclick="addPatient()">Add Patient</button>
  <div id="plist"></div>
</section>

<!-- DOCTORS -->
<section id="doctors" class="page">
  <h2>Doctors</h2>
  <input id="dname" placeholder="Doctor Name">
  <input id="dspec" placeholder="Specialization">
  <button onclick="addDoctor()">Add Doctor</button>
  <div id="dlist"></div>
</section>

<!-- APPOINTMENTS -->
<section id="appointments" class="page">
  <h2>Appointments</h2>
  <input id="ap" placeholder="Patient Name">
  <input id="ad" placeholder="Doctor Name">
  <input id="adate" type="date">
  <button onclick="addAppointment()">Book Appointment</button>
  <div id="alist"></div>
</section>

<!-- BILLING -->
<section id="billing" class="page">
  <h2>Billing</h2>
  <input id="bservice" placeholder="Service">
  <input id="bprice" type="number" placeholder="Amount">
  <button onclick="addBill()">Add</button>
  <h3>Total: ₹<span id="total">0</span></h3>
</section>

<!-- ANALYTICS -->
<section id="analytics" class="page">
  <h2>Analytics</h2>
  <canvas id="chart" height="120"></canvas>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
